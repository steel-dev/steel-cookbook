# Steel Cookbook Registry
#
# Each entry: { title, slug, path, description, authors, language, topics,
#              created, updated }
#
# - slug is the concept key and the docs URL path. Multiple entries may share
#   one slug (one per language variant); uniqueness is enforced on path.
# - title is a short sentence that describes what the recipe teaches.
# - language is the code language of this variant: TypeScript | Python.
# - topics are concept-level labels for browse/filter. 1~3 per entry. The
#   curated sidebar topics are Browser automation / Agents / Computer use /
#   Steel APIs; other topics (Playwright, Browser Use, Authentication, Typed
#   output, Captchas, Mobile, Next.js) appear on cards and drive
#   /cookbook/topics/<topic> views. See CONTRIBUTING.md for the curated list.
# - created is the publish date for this variant (YYYY-MM-DD). Cards on the
#   home and topic pages sort by the earliest created across a concept's
#   variants, so newer recipes surface first. Set once when the recipe lands;
#   don't bump it on later edits.
# - updated is the last meaningful change to this variant (YYYY-MM-DD).
#   Shown in the recipe header. Bump when the README or code gets a real
#   update; skip for typo fixes or sweep-everything refactors.

