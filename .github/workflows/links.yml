name: Link Check

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.md'
      - 'registry.yaml'
      - 'authors.yaml'
      - 'lychee.toml'
  schedule:
    - cron: "0 0 * * SUN"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./lychee.toml --no-progress './**/*.md' 'registry.yaml'
          fail: true
