name: Validate examples

on:
  workflow_dispatch:
  # pull_request:
  # push:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        shell: bash
        run: |
          items=()
          shopt -s nullglob
          for d in examples/*; do
            [ -d "$d" ] || continue
            id="$(basename "$d")"
            if [ -f "$d/package.json" ]; then kind="node"
            elif [ -f "$d/requirements.txt" ] || [ -f "$d/pyproject.toml" ]; then kind="python"
            else kind="unknown"; fi
            items+=("{\"id\":\"$id\",\"dir\":\"$d\",\"kind\":\"$kind\"}")
          done
          printf '{"include":[%s]}\n' "$(IFS=,; echo "${items[*]}")" > matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: discover
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      PIP_DISABLE_PIP_VERSION_CHECK: 1
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Node setup
        if: matrix.kind == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (node)
        if: matrix.kind == 'node'
        working-directory: ${{ matrix.dir }}
        run: npm i --no-fund --no-audit

      - name: Detect Next.js
        if: matrix.kind == 'node'
        id: nextjs
        working-directory: ${{ matrix.dir }}
        run: |
          if compgen -G "next.config.*" > /dev/null; then
            echo "is_nextjs=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_nextjs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build env from .env.example
        working-directory: ${{ matrix.dir }}
        env:
          STEEL_API_KEY: ${{ secrets.STEEL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          : > .env.selected
          if [ -f .env.example ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              case "$line" in
                ''|'#'* ) continue;;
              esac
              key="${line%%=*}"
              key="${key%% }"; key="${key## }"
              if [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
                val="${!key-}"
                if [ -n "${val}" ]; then
                  printf '%s=%q\n' "$key" "$val" >> .env.selected
                fi
              fi
            done < .env.example
          fi
          echo "Selected env keys:"
          if [ -s .env.selected ]; then cut -d '=' -f 1 .env.selected; else echo "(none)"; fi

      - name: Precheck (node no-env)
        if: matrix.kind == 'node' && steps.nextjs.outputs.is_nextjs != 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          if env -u STEEL_API_KEY -u OPENAI_API_KEY -u ANTHROPIC_API_KEY npm run -s start; then
            echo "Expected failure when API keys are missing";
            exit 1;
          else
            echo "Precheck passed: example failed as expected without API keys";
          fi

      - name: Start (node)
        if: matrix.kind == 'node' && steps.nextjs.outputs.is_nextjs != 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          if [ -f .env.selected ]; then echo "Using $(wc -l < .env.selected) env vars from .env.example"; fi
          set -a
          [ -f .env.selected ] && . .env.selected
          set +a
          npm run -s start

      - name: Build (Next.js)
        if: matrix.kind == 'node' && steps.nextjs.outputs.is_nextjs == 'true'
        working-directory: ${{ matrix.dir }}
        run: npm run -s build

      - name: Install uv
        if: matrix.kind == 'python'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            ${{ matrix.dir }}/uv.lock
            ${{ matrix.dir }}/pyproject.toml

      - name: Install (python)
        if: matrix.kind == 'python'
        working-directory: ${{ matrix.dir }}
        run: uv sync

      - name: Precheck (python no-env)
        if: matrix.kind == 'python'
        working-directory: ${{ matrix.dir }}
        run: |
          if env -u STEEL_API_KEY -u OPENAI_API_KEY -u ANTHROPIC_API_KEY -u GEMINI_API_KEY uv run python main.py; then
            echo "Expected failure when API keys are missing";
            exit 1;
          else
            echo "Precheck passed: example failed as expected without API keys";
          fi

      - name: Start (python)
        if: matrix.kind == 'python'
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          if [ -f .env.selected ]; then echo "Using $(wc -l < .env.selected) env vars from .env.example"; fi
          set -a
          [ -f .env.selected ] && . .env.selected
          set +a
          if [ -f main.py ]; then uv run python main.py; else echo "missing main.py"; exit 1; fi
