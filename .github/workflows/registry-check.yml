name: Registry check

on:
  pull_request:
    paths:
      - 'registry.yaml'
      - 'authors.yaml'
      - 'examples/**'
      - '.github/scripts/verify_registry.py'
  push:
    branches: [main]
    paths:
      - 'registry.yaml'
      - 'authors.yaml'
      - 'examples/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python .github/scripts/verify_registry.py
